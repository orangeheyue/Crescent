<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0F1F"/>
      <stop offset="100%" stop-color="#141B33"/>
    </linearGradient>

    <linearGradient id="crescentGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6C8"/>
      <stop offset="50%" stop-color="#E8C77E"/>
      <stop offset="100%" stop-color="#C89B4A"/>
    </linearGradient>

    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5E6C8"/>
      <stop offset="100%" stop-color="#E8C77E"/>
    </linearGradient>

    <filter id="glow2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <mask id="crescentMask2">
      <rect width="1200" height="360" fill="black"/>
      <circle cx="180" cy="180" r="90" fill="white"/>
      <circle cx="210" cy="165" r="86" fill="black"/>
    </mask>
  </defs>

  <!-- Background -->
  <rect width="1200" height="360" fill="url(#bgGrad)"/>

  <!-- Atmosphere: subtle stars -->
  <g opacity="0.6">
    <circle cx="50" cy="50" r="0.8" fill="#F5E6C8"/>
    <circle cx="120" cy="320" r="1" fill="#F5E6C8"/>
    <circle cx="380" cy="80" r="0.9" fill="#F5E6C8"/>
    <circle cx="450" cy="300" r="0.7" fill="#F5E6C8"/>
    <circle cx="900" cy="60" r="1.1" fill="#F5E6C8"/>
    <circle cx="1050" cy="290" r="0.8" fill="#F5E6C8"/>
    <circle cx="1150" cy="120" r="1" fill="#F5E6C8"/>
    <circle cx="780" cy="320" r="0.7" fill="#F5E6C8"/>
    <circle cx="650" cy="50" r="0.9" fill="#F5E6C8"/>
  </g>

  <!-- Logo group on the left -->
  <g>
    <!-- Outer dashed circle: the "ideal" full multimodality -->
    <circle
      cx="180" cy="180" r="118"
      fill="none"
      stroke="#3A4A6B"
      stroke-width="1"
      stroke-dasharray="2 5"
      opacity="0.7"/>

    <!-- Inner dashed circle: inferred completion -->
    <circle
      cx="180" cy="180" r="90"
      fill="none"
      stroke="#6B7FA8"
      stroke-width="1.2"
      stroke-dasharray="3 4"
      opacity="0.5"/>

    <!-- Three modality nodes -->
    <g>
      <circle cx="180" cy="62" r="5" fill="#F5E6C8" opacity="0.95"/>
      <circle cx="180" cy="62" r="9" fill="none" stroke="#F5E6C8" stroke-width="0.7" opacity="0.35"/>
    </g>
    <g>
      <circle cx="78" cy="240" r="5" fill="#E8C77E" opacity="0.95"/>
      <circle cx="78" cy="240" r="9" fill="none" stroke="#E8C77E" stroke-width="0.7" opacity="0.35"/>
    </g>
    <g>
      <circle cx="282" cy="240" r="5" fill="#6B7FA8" opacity="0.55"/>
      <circle cx="282" cy="240" r="9" fill="none" stroke="#6B7FA8" stroke-width="0.7" stroke-dasharray="2 3" opacity="0.4"/>
    </g>

    <!-- Crescent moon body -->
    <g filter="url(#glow2)">
      <rect x="50" y="50" width="260" height="260" fill="url(#crescentGrad2)" mask="url(#crescentMask2)"/>
    </g>

    <!-- Inner highlight -->
    <path
      d="M 180 90 A 90 90 0 0 0 138 252"
      fill="none"
      stroke="#FFF8E8"
      stroke-width="1"
      opacity="0.5"/>
  </g>

  <!-- Text block on the right -->
  <g>
    <!-- "Crescent" main title -->
    <text x="380" y="155"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="84"
          font-weight="400"
          letter-spacing="2"
          fill="url(#titleGrad)">Crescent</text>

    <!-- Chinese subtitle "新月" -->
    <text x="385" y="205"
          font-family="'STKaiti', 'KaiTi', 'Songti SC', serif"
          font-size="32"
          font-weight="300"
          letter-spacing="8"
          fill="#C89B4A"
          opacity="0.85">新 月</text>

    <!-- Decorative line -->
    <line x1="385" y1="225" x2="500" y2="225"
          stroke="#C89B4A"
          stroke-width="0.8"
          opacity="0.5"/>

    <!-- Tagline (English) -->
    <text x="385" y="258"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="17"
          font-style="italic"
          font-weight="300"
          letter-spacing="0.5"
          fill="#9FB0CC"
          opacity="0.9">A Unified Framework for Multimodal Recommendation</text>
    <text x="385" y="282"
          font-family="Georgia, 'Times New Roman', serif"
          font-size="17"
          font-style="italic"
          font-weight="300"
          letter-spacing="0.5"
          fill="#9FB0CC"
          opacity="0.9">under Modality Missingness</text>

    <!-- Su Shi verse (Chinese) -->
    <text x="385" y="320"
          font-family="'STKaiti', 'KaiTi', serif"
          font-size="14"
          font-weight="300"
          letter-spacing="3"
          fill="#6B7FA8"
          opacity="0.75">人有悲欢离合，月有阴晴圆缺  · 苏轼</text>
  </g>
</svg>
