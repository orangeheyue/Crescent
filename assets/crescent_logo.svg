<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <!-- Background subtle gradient for depth -->
  <defs>
    <!-- Crescent body gradient: warm moonlight -->
    <linearGradient id="crescentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6C8"/>
      <stop offset="50%" stop-color="#E8C77E"/>
      <stop offset="100%" stop-color="#C89B4A"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Mask to carve crescent shape from full circle -->
    <mask id="crescentMask">
      <rect width="400" height="400" fill="black"/>
      <circle cx="200" cy="200" r="120" fill="white"/>
      <circle cx="240" cy="180" r="115" fill="black"/>
    </mask>
  </defs>

  <!-- Dark canvas background (deep night) -->
  <rect width="400" height="400" fill="#0E1424"/>

  <!-- Outer dashed circle: the "full" form, representing complete multimodality -->
  <circle
    cx="200" cy="200" r="155"
    fill="none"
    stroke="#3A4A6B"
    stroke-width="1.2"
    stroke-dasharray="2 6"
    opacity="0.7"/>

  <!-- Inner dashed circle: the inferred completion of the moon -->
  <circle
    cx="200" cy="200" r="120"
    fill="none"
    stroke="#6B7FA8"
    stroke-width="1.5"
    stroke-dasharray="3 5"
    opacity="0.55"/>

  <!-- Three modality nodes around the outer circle -->
  <!-- Visual modality node (top) -->
  <g>
    <circle cx="200" cy="45" r="6" fill="#F5E6C8" opacity="0.95"/>
    <circle cx="200" cy="45" r="11" fill="none" stroke="#F5E6C8" stroke-width="0.8" opacity="0.35"/>
  </g>
  <!-- Text modality node (bottom-left) -->
  <g>
    <circle cx="65" cy="278" r="6" fill="#E8C77E" opacity="0.95"/>
    <circle cx="65" cy="278" r="11" fill="none" stroke="#E8C77E" stroke-width="0.8" opacity="0.35"/>
  </g>
  <!-- Audio/other modality node (bottom-right) - dimmed to suggest "missing" -->
  <g>
    <circle cx="335" cy="278" r="6" fill="#6B7FA8" opacity="0.55"/>
    <circle cx="335" cy="278" r="11" fill="none" stroke="#6B7FA8" stroke-width="0.8" stroke-dasharray="2 3" opacity="0.4"/>
  </g>

  <!-- Faint connecting lines from modality nodes to crescent center -->
  <line x1="200" y1="55" x2="200" y2="85" stroke="#F5E6C8" stroke-width="0.6" opacity="0.3"/>
  <line x1="75" y1="272" x2="100" y2="255" stroke="#E8C77E" stroke-width="0.6" opacity="0.3"/>
  <line x1="325" y1="272" x2="300" y2="255" stroke="#6B7FA8" stroke-width="0.6" opacity="0.25" stroke-dasharray="2 3"/>

  <!-- The crescent moon itself (the visible, observed reality) -->
  <g filter="url(#glow)">
    <rect width="400" height="400" fill="url(#crescentGrad)" mask="url(#crescentMask)"/>
  </g>

  <!-- Subtle inner highlight on crescent edge for depth -->
  <path
    d="M 200 80 A 120 120 0 0 0 144 295"
    fill="none"
    stroke="#FFF8E8"
    stroke-width="1.2"
    opacity="0.5"/>

  <!-- Tiny stars scattered for atmosphere -->
  <circle cx="80" cy="100" r="1" fill="#F5E6C8" opacity="0.6"/>
  <circle cx="320" cy="120" r="1.2" fill="#F5E6C8" opacity="0.5"/>
  <circle cx="350" cy="80" r="0.8" fill="#F5E6C8" opacity="0.7"/>
  <circle cx="60" cy="180" r="0.9" fill="#F5E6C8" opacity="0.4"/>
  <circle cx="340" cy="340" r="1" fill="#F5E6C8" opacity="0.5"/>
  <circle cx="100" cy="350" r="0.8" fill="#F5E6C8" opacity="0.45"/>
</svg>
